<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowOS</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:#0d1117;

            color:white;

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;

        }

        .container{

            text-align:center;

        }

        h1{

            font-size:60px;

            margin-top:25px;

            letter-spacing:3px;

        }

        h2{

            margin-top:18px;

            color:#8b949e;

            font-weight:300;

            font-size:22px;

        }

        .btn{

            margin-top:60px;

            display:inline-block;

            background:#2ea043;

            color:white;

            text-decoration:none;

            padding:18px 55px;

            border-radius:10px;

            font-size:22px;

            transition:.3s;

        }

        .btn:hover{

            background:#238636;

        }

        .version{

            position:absolute;

            bottom:25px;

            width:100%;

            text-align:center;

            color:#6e7681;

            font-size:14px;

        }

        .logo{

            width:180px;

            height:180px;

            border-radius:50%;

            background:#161b22;

            display:flex;

            align-items:center;

            justify-content:center;

            margin:auto;

            font-size:72px;

        }

    </style>

</head>

<body>

<div class="container">

<div class="logo">

🌱

</div>

<h1>GrowOS</h1>

<h2>Tecnologia que cultiva resultados.</h2>

<a href="#" class="btn">

Entrar

</a>

</div>

<div class="version">

GrowOS® v1.0

</div>

</body>

</html>
